<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>{{TITLE}}</title>

</head>

<body
    style="
        margin:0;
        padding:0;
        background:#F8FAFC;
        font-family:Arial,Helvetica,sans-serif;
    "
>

<table
    role="presentation"
    width="100%"
    cellspacing="0"
    cellpadding="0"
    style="
        padding:50px 20px;
        background:#F8FAFC;
    "
>

<tr>

<td align="center">

<table
    role="presentation"
    width="620"
    cellspacing="0"
    cellpadding="0"
    style="
        max-width:620px;
        background:white;
        border-radius:20px;
        overflow:hidden;
        border:1px solid #E2E8F0;
    "
>

<!-- HEADER -->

<tr>

<td
    align="center"
    style="
        padding:45px 40px 25px;
    "
>

<img
    src="https://dinerop.com/logo.png"
    alt="Dinerop"
    width="72"
    style="display:block;"
>

<div
    style="
        margin-top:18px;
        font-size:28px;
        font-weight:700;
        color:#0F172A;
        letter-spacing:.08em;
    "
>

DINEROP

</div>

<div
    style="
        margin-top:8px;
        color:#64748B;
        font-size:15px;
    "
>

Financial Platform

</div>

</td>

</tr>

<!-- BODY -->

<tr>

<td
    style="
        padding:0 50px 45px;
    "
>

<h1
    style="
        margin:0;
        text-align:center;
        color:#0F172A;
        font-size:32px;
    "
>

{{TITLE}}

</h1>

<p
    style="
        margin-top:22px;
        text-align:center;
        color:#475569;
        line-height:30px;
        font-size:17px;
    "
>

{{MESSAGE}}

</p>

<div
    style="
        margin-top:40px;
        text-align:center;
    "
>

<a
    href="{{BUTTON_URL}}"
    style="
        display:inline-block;
        background:#06B6D4;
        color:white;
        padding:18px 34px;
        border-radius:14px;
        text-decoration:none;
        font-weight:bold;
        font-size:16px;
    "
>

{{BUTTON_TEXT}}

</a>

</div>

<table
    width="100%"
    style="
        margin-top:45px;
        background:#F8FAFC;
        border:1px solid #E2E8F0;
        border-radius:14px;
        padding:22px;
    "
>

<tr>

<td>

<div
style="
font-size:15px;
font-weight:700;
color:#0F172A;
margin-bottom:10px;
"
>

Información importante

</div>

<div
style="
color:#64748B;
line-height:28px;
font-size:15px;
"
>

✓ {{INFO_1}}<br>

✓ {{INFO_2}}<br>

✓ {{INFO_3}}

</div>

</td>

</tr>

</table>

</td>

</tr>

<!-- FOOTER -->

<tr>

<td
style="
padding:35px;
border-top:1px solid #E2E8F0;
text-align:center;
color:#94A3B8;
font-size:13px;
line-height:24px;
"
>

Si no solicitaste este correo puedes ignorarlo.

<br><br>

© 2026 Dinerop

<br>

www.dinerop.com

</td>

</tr>

</table>

</td>

</tr>

</table>

</body>

</html>
